<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BTI — Beauty Type Indicator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Serif+JP:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0c0b;--bg2:#141412;--white:#f8f5ef;--gold:#c4963f;--gold-light:#e0b96a;
  --gray:#7a7670;--gray-light:#a8a49b;--line:rgba(248,245,239,0.1);
  --serif:'Cormorant Garamond',serif;--jp:'Noto Serif JP',serif;--sans:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--sans)}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.5s ease}
.screen.active{opacity:1;pointer-events:all}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(196,150,63,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}

#landing{justify-content:center;align-items:center;text-align:center;padding:40px 32px;z-index:1;overflow-y:auto}
.landing-tag{font-family:var(--sans);font-size:10px;letter-spacing:0.45em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:12px}
.landing-tag::before,.landing-tag::after{content:"";width:24px;height:1px;background:var(--gold)}
.landing-bti{font-family:var(--serif);font-size:clamp(80px,20vw,160px);font-weight:300;line-height:0.9;letter-spacing:-0.03em;color:var(--white);margin-bottom:8px;position:relative}
.landing-bti::after{content:"BTI";position:absolute;top:3px;left:3px;color:var(--gold);opacity:0.12;pointer-events:none}
.landing-en{font-family:var(--sans);font-size:clamp(9px,2vw,13px);letter-spacing:0.5em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:block}
.landing-divider{width:48px;height:1px;background:var(--gold);margin:20px auto}
.landing-sub{font-family:var(--jp);font-size:clamp(11px,2.8vw,13px);letter-spacing:0.08em;color:var(--gray-light);margin-bottom:40px;line-height:2}
.landing-stats{display:flex;justify-content:center;border:1px solid var(--line);margin-bottom:40px;max-width:360px;margin-left:auto;margin-right:auto}
.landing-stat{padding:16px 20px;flex:1;border-right:1px solid var(--line);text-align:center}
.landing-stat:last-child{border-right:none}
.landing-stat-label{font-family:var(--sans);font-size:8px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:4px}
.landing-stat-val{font-family:var(--serif);font-size:28px;font-weight:300;color:var(--white);display:block;line-height:1}
.btn-start{display:inline-flex;align-items:center;gap:12px;padding:16px 36px;background:var(--gold);color:#0c0c0b;font-family:var(--sans);font-size:11px;letter-spacing:0.3em;text-transform:uppercase;font-weight:600;border:none;cursor:pointer;transition:all 0.3s}
.btn-start:hover{background:var(--gold-light)}

#quiz{z-index:1;overflow:hidden}
.quiz-progress-wrap{position:absolute;top:0;left:0;right:0;z-index:10;padding:20px 24px 0}
.quiz-progress-bar-bg{height:2px;background:rgba(248,245,239,0.08);position:relative;overflow:hidden}
.quiz-progress-bar-fill{position:absolute;top:0;left:0;height:100%;background:var(--gold);width:0%;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.quiz-progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-progress-count{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--gold)}
.quiz-progress-axis{font-family:var(--sans);font-size:8px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gray)}
.quiz-cards{position:absolute;inset:0;top:80px}
.quiz-card{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:24px 28px 120px;opacity:0;transform:translateX(60px);transition:all 0.45s cubic-bezier(0.4,0,0.2,1);pointer-events:none}
.quiz-card.active{opacity:1;transform:translateX(0);pointer-events:all}
.quiz-card.exit{opacity:0;transform:translateX(-60px)}
.quiz-q-num{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--gold);margin-bottom:20px;letter-spacing:0.1em}
.quiz-q-text{font-family:var(--jp);font-size:clamp(17px,4.2vw,22px);font-weight:500;color:var(--white);line-height:1.6;letter-spacing:0.04em;margin-bottom:28px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-opt{background:transparent;border:1px solid var(--line);color:var(--white);padding:16px 20px;text-align:left;cursor:pointer;font-family:var(--jp);font-size:clamp(13px,3.2vw,15px);line-height:1.5;transition:all 0.25s;display:flex;align-items:center;gap:14px;-webkit-appearance:none;border-radius:0}
.quiz-opt:active{transform:scale(0.98)}
.quiz-opt-letter{font-family:var(--serif);font-size:18px;font-style:italic;color:var(--gold);min-width:18px;flex-shrink:0}
.quiz-opt:hover,.quiz-opt.selected{background:rgba(196,150,63,0.08);border-color:rgba(196,150,63,0.4)}
.quiz-opt.selected{border-color:var(--gold)}
.quiz-bottom{position:absolute;bottom:0;left:0;right:0;padding:20px 28px;background:linear-gradient(transparent,var(--bg) 40%)}
.quiz-back-btn{background:none;border:none;color:var(--gray);font-family:var(--sans);font-size:10px;letter-spacing:0.25em;text-transform:uppercase;cursor:pointer;padding:8px 0}
.quiz-back-btn:disabled{opacity:0.3;cursor:not-allowed}

#loading{justify-content:center;align-items:center;z-index:1;gap:24px}
.loading-spinner{width:64px;height:64px}
.loading-spinner svg{width:100%;height:100%;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--jp);font-size:14px;letter-spacing:0.2em;color:var(--gray-light)}
.loading-code{font-family:var(--serif);font-size:11px;letter-spacing:0.4em;color:var(--gray);text-transform:uppercase}

#result{overflow-y:auto;z-index:1;-webkit-overflow-scrolling:touch}
.result-inner{padding:60px 28px 40px;max-width:600px;margin:0 auto;min-height:100%}
.result-eyebrow{font-family:var(--sans);font-size:9px;letter-spacing:0.45em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:16px}
.result-code{font-family:var(--serif);font-size:clamp(60px,15vw,110px);font-weight:300;line-height:0.9;letter-spacing:-0.02em;color:var(--white);text-align:center;margin-bottom:16px;display:block}
.result-name{font-family:var(--jp);font-size:clamp(17px,4.2vw,22px);font-weight:600;letter-spacing:0.1em;text-align:center;margin-bottom:8px}
.result-catch{font-family:var(--jp);font-size:clamp(12px,3vw,14px);letter-spacing:0.15em;color:var(--gold-light);text-align:center;font-style:italic;margin-bottom:32px}
.result-axes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px}
.result-axis{background:var(--bg2);border:1px solid var(--line);padding:14px 16px}
.result-axis-label{font-family:var(--sans);font-size:8px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gray);margin-bottom:8px;display:block}
.result-axis-val{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--white);margin-bottom:8px;display:block}
.result-axis-bar{height:2px;background:rgba(248,245,239,0.08);position:relative}
.result-axis-bar-fill{position:absolute;top:0;left:0;height:100%;background:var(--gold);width:0%;transition:width 1.2s cubic-bezier(0.4,0,0.2,1)}
.result-desc-wrap{border:1px solid var(--line);padding:24px;margin-bottom:24px}
.result-desc-label{font-family:var(--sans);font-size:8px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:block}
.result-desc{font-family:var(--jp);font-size:13px;line-height:2.1;color:rgba(248,245,239,0.8)}
.result-cta-wrap{border:1px solid rgba(196,150,63,0.3);padding:28px 24px;text-align:center;background:rgba(196,150,63,0.03);margin-bottom:20px}
.result-cta-eyebrow{font-family:var(--sans);font-size:8px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:block}
.result-cta-title{font-family:var(--jp);font-size:clamp(15px,3.8vw,18px);font-weight:500;letter-spacing:0.08em;line-height:1.6;margin-bottom:12px}
.result-cta-items{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;text-align:left}
.result-cta-item{font-family:var(--jp);font-size:12px;color:rgba(248,245,239,0.7);display:flex;align-items:center;gap:8px}
.result-cta-item::before{content:"◆";color:var(--gold);font-size:8px;flex-shrink:0}
.btn-line{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:18px 24px;background:#06C755;color:#fff;border:none;cursor:pointer;font-family:var(--sans);font-size:11px;letter-spacing:0.25em;text-transform:uppercase;font-weight:600;text-decoration:none;transition:all 0.3s}
.btn-line:hover{background:#05b34d;transform:translateY(-1px)}
.btn-line-sub{font-family:var(--jp);font-size:10px;letter-spacing:0.1em;opacity:0.85;display:block;margin-top:3px;font-weight:400}
.result-share{text-align:center;padding-top:20px;border-top:1px solid var(--line)}
.result-share-label{font-family:var(--sans);font-size:8px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gray);margin-bottom:14px;display:block}
.share-btns{display:flex;justify-content:center;gap:12px}
.share-btn{width:40px;height:40px;border:1px solid var(--line);background:transparent;color:var(--gray-light);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.share-btn:hover{border-color:var(--gold);color:var(--gold)}

@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.result-inner>*{opacity:0;animation:fadeInUp 0.6s ease forwards}
.result-inner>*:nth-child(1){animation-delay:0.1s}.result-inner>*:nth-child(2){animation-delay:0.2s}
.result-inner>*:nth-child(3){animation-delay:0.3s}.result-inner>*:nth-child(4){animation-delay:0.4s}
.result-inner>*:nth-child(5){animation-delay:0.5s}.result-inner>*:nth-child(6){animation-delay:0.6s}
.result-inner>*:nth-child(7){animation-delay:0.7s}.result-inner>*:nth-child(8){animation-delay:0.8s}
@media(max-width:400px){.landing-bti{font-size:72px}.quiz-card{padding:20px 20px 110px}}
</style>
</head>
<body>

<div class="screen active" id="landing">
  <div class="landing-tag">Stylist Personality Diagnostic</div>
  <div class="landing-bti">BTI</div>
  <span class="landing-en">Beauty Type Indicator</span>
  <div class="landing-divider"></div>
  <div class="landing-jp" style="font-size:clamp(22px,5.5vw,30px);color:var(--white);font-weight:500;letter-spacing:0.15em;margin-bottom:4px">
    <span style="color:var(--gold-light)">美容師</span>のための診断。
  </div>
  <div style="font-family:var(--jp);margin-bottom:8px">
    <span style="font-family:var(--serif);font-size:clamp(56px,14vw,88px);font-weight:300;color:var(--gold);line-height:1">16</span><span style="font-family:var(--jp);font-size:clamp(18px,4.5vw,26px);font-weight:500;color:var(--white);letter-spacing:0.1em;margin-left:8px"> タイプ診断</span>
  </div>
  <div class="landing-sub">30の質問から、あなたの<br>「美容師としての素顔」を解き明かす。</div>
  <div class="landing-stats">
    <div class="landing-stat">
      <span class="landing-stat-label">Questions</span>
      <span class="landing-stat-val">30</span>
    </div>
    <div class="landing-stat">
      <span class="landing-stat-label">Types</span>
      <span class="landing-stat-val">16</span>
    </div>
    <div class="landing-stat">
      <span class="landing-stat-label">所要時間</span>
      <span class="landing-stat-val" style="font-family:var(--jp);white-space:nowrap;color:var(--gold-light)"><span style="font-size:14px">約</span><span style="font-size:28px">3</span><span style="font-size:14px">分</span></span>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">診断をはじめる →</button>
</div>

<div class="screen" id="quiz">
  <div class="quiz-progress-wrap">
    <div class="quiz-progress-meta">
      <span class="quiz-progress-count" id="qCount">1 / 30</span>
      <span class="quiz-progress-axis" id="qAxis"></span>
    </div>
    <div class="quiz-progress-bar-bg"><div class="quiz-progress-bar-fill" id="qFill"></div></div>
  </div>
  <div class="quiz-cards" id="quizCards"></div>
  <div class="quiz-bottom">
    <button class="quiz-back-btn" id="backBtn" onclick="goBack()" disabled>← 前の質問</button>
  </div>
</div>

<div class="screen" id="loading">
  <div class="loading-code" id="loadingCode">ANALYZING</div>
  <div class="loading-spinner">
    <svg viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="28" stroke="rgba(196,150,63,0.2)" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="28" stroke="#c4963f" stroke-width="1.5" stroke-dasharray="44 132" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="loading-text" id="loadingText">16タイプから、あなたの型を照合中...</div>
</div>

<div class="screen" id="result">
  <div class="result-inner" id="resultInner"></div>
</div>

<script>
// ===== 30問 =====
const Q = [
  // Axis 01
  {axis:'Axis 01 / Player ⇔ Builder',q:'月末、売上目標に届かなかった。最初にとった行動は？',opts:['自分の技術や接客を見直して次月に備えた','集客の導線や仕組みを洗い直した','営業日を増やすか稼働を上げた','正直、そこまで深く考えなかった'],sc:['P','B','P','N']},
  {axis:'Axis 01 / Player ⇔ Builder',q:'1,000万円が手に入ったら、まず何に使う？',opts:['高級車・ブランド品・時計など自分へのご褒美','自分の店・ブランドの開業や拡大資金','投資・貯金して将来に備える','スタッフや環境への投資に使う'],sc:['P','B','B','B']},
  {axis:'Axis 01 / Player ⇔ Builder',q:'尊敬する人物に近いのは？',opts:['指名売上トップクラスのカリスマ美容師','組織を作って業界を変えた経営者','独立して成功した経営者','技術と人望で地域に愛されるスタイリスト'],sc:['P','B','B','P']},
  {axis:'Axis 01 / Player ⇔ Builder',q:'スタッフが辞めると言い出した時、最初に頭に浮かんだのは？',opts:['技術や教育面で不安があったのかな','評価制度や待遇に問題があったのかも','人間関係で何かあったのかな','自分に何かできることはあったか'],sc:['P','B','N','H']},
  {axis:'Axis 01 / Player ⇔ Builder',q:'新しいことを始める時、あなたはどちらに近い？',opts:['とりあえずやってみる、走りながら考える','計画を立てて勝算が見えてから動く','誰かと一緒にやれる環境を先に作る','小さく試して反応を見てから判断する'],sc:['P','B','C','B']},
  // Axis 02
  {axis:'Axis 02 / Solo ⇔ Crew',q:'指名客が急増した時、本音は？',opts:['いい感じ、もっと伸ばしたい','嬉しいけど現状で満足、このくらいでいい','嬉しいけどしんどい、誰かに振りたい','後輩に回して教育のチャンスにしたい'],sc:['S','N','C','C']},
  {axis:'Axis 02 / Solo ⇔ Crew',q:'営業中、雑談が多めの先輩スタイリストを見て思うことは？',opts:['楽しそう、自分もそういう雰囲気が好き','場面によりけり、状況次第','仕事中はもう少し集中してほしい','お客様が楽しそうならそれでいい'],sc:['C','N','S','N']},
  {axis:'Axis 02 / Solo ⇔ Crew',q:'SNSを育てるなら、どちらを優先する？',opts:['自分個人のアカウント','サロン全体のアカウント','どちらも同じくらい','正直、SNSはあまり興味がない'],sc:['S','C','N','N']},
  {axis:'Axis 02 / Solo ⇔ Crew',q:'一緒に働く人数、理想は？',opts:['1人がいい、自分のペースが大事','2〜4人、自分の目が届く範囲','4〜7人くらい、ちょうどよい規模','10人以上、大きなチームで動きたい'],sc:['S','S','N','C']},
  {axis:'Axis 02 / Solo ⇔ Crew',q:'チームで動く時、自分が一番心地よいポジションは？',opts:['自分のペースで個人の仕事に集中する','リーダーとして全体をまとめる','サポートや裏方として支える','現場と経営の橋渡し役'],sc:['S','C','C','B']},
  // Axis 03
  {axis:'Axis 03 / Stable ⇔ Scale',q:'年収が倍になるが休日が半分になるオファー。どうする？',opts:['やる、稼げる時に稼いでおきたい','やらない、プライベートの時間は譲れない','内容と期間次第で検討する','今の状況によって変わる'],sc:['Sc','St','N','N']},
  {axis:'Axis 03 / Stable ⇔ Scale',q:'同期が独立して急成長していると聞いた。本音は？',opts:['悔しい、自分も追いかけたい','すごいな、と思うが自分には関係ない','どんな仕組みで成長しているか気になる','自分の道があるからそれでいい'],sc:['Sc','N','B','St']},
  {axis:'Axis 03 / Stable ⇔ Scale',q:'「現状維持」についての本音は？',opts:['退化と同じ、よくない','維持できているなら十分立派','今が幸せならそれでいい','状況によって正解は変わる'],sc:['Sc','St','St','N']},
  {axis:'Axis 03 / Stable ⇔ Scale',q:'5年後、こうなっていたい。',opts:['技術で周囲から尊敬されている','経営者として事業を拡大している','信頼できる仲間と働いている','自分らしい働き方を実現している'],sc:['St','Sc','N','N']},
  {axis:'Axis 03 / Stable ⇔ Scale',q:'お金と時間、どちらが今の自分には大事？',opts:['お金、稼げれば時間は作れる','時間、お金では買えないものがある','今はお金、将来は時間のバランスで考える','どちらも同じくらい大事'],sc:['Sc','St','N','N']},
  // Axis 04
  {axis:'Axis 04 / Heart ⇔ Logic',q:'後輩が明らかに落ち込んでいる。あなたは？',opts:['まず話を聞いて寄り添う','原因を分析して解決策を一緒に考える','心配だけど、どう声をかければいいかわからない','自分で立ち直るだろうと様子を見る'],sc:['H','L','N','N']},
  {axis:'Axis 04 / Heart ⇔ Logic',q:'指名がつかない若手スタッフを見て思うことは？',opts:['気持ちを支えてあげたい','何が原因か数字や行動で洗い出したい','心配だけど声がかけられない','正直、自分のことで精一杯'],sc:['H','L','N','N']},
  {axis:'Axis 04 / Heart ⇔ Logic',q:'自分が一番嬉しい瞬間は？',opts:['お客様に「ありがとう」と言われた時','売上・指名数が目標を超えた時','後輩やスタッフが成長した瞬間','給料・歩合・利益が上がった時'],sc:['H','L','H','L']},
  {axis:'Axis 04 / Heart ⇔ Logic',q:'クレームが入った時、まず動くのは？',opts:['お客様の気持ちを汲んで誠実に謝る','何が起きたか事実確認を急ぐ','店長や上司に素早く報告・相談する','再発しないよう仕組みや原因を考える'],sc:['H','L','N','L']},
  {axis:'Axis 04 / Heart ⇔ Logic',q:'チームミーティングでの自分の発言スタイルは？',opts:['雰囲気や空気感、感情的な話が多い','数字や具体的な改善策の話が多い','聞き役に回ることが多い','全体をまとめる・整理する役割が多い'],sc:['H','L','N','B']},
  // Stylist Deep
  {axis:'Stylist Deep',q:'__Q21__',opts:['__A__','__B__','__C__','__D__'],sc:['S4','S3','S2','S1']},
  {axis:'Stylist Deep',q:'お客様との関係、本音は？',opts:['担当を超えた関係、友達感覚の人もいる','適度な距離感が心地よい','施術中だけの関係でいい','お客様によって使い分けている'],sc:['H','N','L','N']},
  {axis:'Stylist Deep',q:'自分の武器はどれ？',opts:['技術力・再現性・丁寧さ','接客・会話力・居心地の良さ','世界観・SNS・ビジュアルセンス','武器といえるほどのものはまだない'],sc:['CRAFT','HEART','CREATE','N']},

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

}

function startQuiz() {
  position = null; salonWork = null; age = null; questionsArr = [];
  showScreen('quiz');
  showPositionScreen();
}

function selectAnswer(qIdx, optIdx) {
  if (qIdx !== current) return;
  const q = questionsArr[qIdx];
  const sc = q.sc[optIdx];
  const opts = document.querySelectorAll(`#card-${qIdx} .quiz-opt`);
  opts[optIdx].classList.add('selected');
  answers[qIdx] = optIdx;
  if (scores[sc] !== undefined) scores[sc]++;
  setTimeout(() => {
    current++;
    if (current >= questionsArr.length) {
      finishQuiz();
    } else {
      const prevCard = document.getElementById('card-' + (current-1));
      const nextCard = document.getElementById('card-' + current);
      prevCard.classList.remove('active');
      prevCard.classList.add('exit');
      setTimeout(() => prevCard.classList.remove('exit'), 450);
      nextCard.classList.add('active');
      updateProgress();
    }
  }, 280);
}

function goBack() {
  if (current <= 0) return;
  const prevQ = questionsArr[current-1];
  const prevAns = answers[current-1];
  if (prevAns !== undefined) {
    const sc = prevQ.sc[prevAns];
    if (scores[sc] !== undefined && scores[sc] > 0) scores[sc]--;
    answers.pop();
  }
  const curCard = document.getElementById('card-' + current);
  const prevCard = document.getElementById('card-' + (current-1));
  curCard.classList.remove('active');
  prevCard.classList.remove('exit');
  prevCard.classList.add('active');
  prevCard.querySelectorAll('.quiz-opt').forEach(o => o.classList.remove('selected'));
  current--;
  updateProgress();
}

function updateProgress() {
  document.getElementById('qCount').textContent = `${current+1} / ${questionsArr.length}`;
  document.getElementById('qAxis').textContent = questionsArr[current]?.axis || '';
  document.getElementById('qFill').style.width = ((current+1)/questionsArr.length*100) + '%';
  document.getElementById('backBtn').disabled = current === 0;
}

function finishQuiz() {
  showScreen('loading');
  const msgs = ['16タイプから、あなたの型を照合中...','4つの判定軸を分析中...','パーソナリティを解析中...','診断結果を生成中...'];
  let mi = 0;
  const codes = ['ANALYZING ·','ANALYZING ··','ANALYZING ···','PROCESSING'];
  const iv = setInterval(() => {
    mi++;
    document.getElementById('loadingText').textContent = msgs[mi % msgs.length];
    document.getElementById('loadingCode').textContent = codes[mi % codes.length];

}

// ===== 判定ロジック =====
function determineType() {
  const isBuilder = scores.B > scores.P;
  const isCrew = scores.C > scores.S;
  const isScale = scores.Sc > scores.St;
  const isHeart = scores.H >= scores.L;
  const isFree = scores.FREE > scores.STAY;
  const wantsOwner = scores.OWNER >= 1;
  const isCreate = scores.CREATE >= scores.CRAFT;
  const isEdu = scores.EDU >= 1;

  // 指名売上レベル（年齢補正あり）
  // 同じ売上でも年齢によって意味が違う
  // A=24以下, B=25-30, C=31-35, D=36-40, E=41以上
  let salesLv = scores.S4>=1 ? 4 : scores.S3>=1 ? 3 : scores.S2>=1 ? 2 : 1;
  // 年齢補正：若いほど同じ売上でも高評価、年齢高いほど厳しく評価
  if (age === 'A') salesLv = Math.min(4, salesLv + 1); // 24歳以下は+1ボーナス
  if (age === 'D') salesLv = Math.max(1, salesLv - 1); // 36-40歳は-1
  if (age === 'E') salesLv = Math.max(1, salesLv - 1); // 41歳以上は-1
  
  // 年齢×ポジション補正
  // 30歳以上で売上低め → EDU/MENTOR/CONTRACT寄りに補正
  // ただしサロンワーク少ない幹部・オーナー（D/EでswがC/D）は除外
  const ignoreSalesAge = (position === 'D' || position === 'E') && (salonWork === 'C' || salonWork === 'D');
  const isOlderLowSales = !ignoreSalesAge && (age === 'C' || age === 'D' || age === 'E') && salesLv <= 2;
  // 24歳以下で売上高め → STAR/FREELANCE適性あり
  const isYoungHighSales = age === 'A' && salesLv >= 3;

  // サロンワーク補正（D/E向け）
  const swHeavy = salonWork === 'A' || salonWork === 'B';
  const swLight = salonWork === 'C' || salonWork === 'D';

  // ===== オーナー・経営者(E) =====
  if (position === 'E') {
    // よっぽどの場合のみ非オーナータイプ
    if (!isBuilder && !isScale && isHeart && isCrew && scores.H >= 4) return 'MENTOR';
    if (!isBuilder && !isScale && !isHeart && scores.L >= 4) return 'CRAFTER';
    // オーナー系判定
    if (isScale && isCrew) return 'SCALE';
    if (isScale) return 'MULTI';
    if (isBuilder && isCrew) return 'MULTI';
    if (isBuilder) return 'FC';
    // Solo×Stable寄り
    return 'SOLO';
  }

  // ===== 幹部・NO.2(D) =====
  if (position === 'D') {
    // オーナー志向が強い場合
    if (wantsOwner && isScale && isBuilder) return 'MULTI';
    if (wantsOwner && isBuilder) return 'FC';
    // サロンワーク多め
    if (swHeavy) {
      if (isHeart) return 'MANAGER';
      return 'EXEC';
    }
    // サロンワーク少なめ
    if (isHeart) return 'NO2';
    return 'EXEC';
  }

  // ===== 店長・副店長(C) =====
  if (position === 'C') {
    if (wantsOwner && isBuilder && isScale) return 'MULTI';
    if (wantsOwner && isBuilder) return 'MICRO';
    if (isScale && isBuilder) return 'MANAGER';
    if (isHeart && isCrew) return 'MENTOR';
    if (!isHeart && isEdu) return 'EDU';
    if (isHeart) return 'MENTOR';
    return 'MANAGER';
  }

  // ===== スタイリスト(B) / アシスタント(A) =====

  // Builder系（将来オーナー・組織系志向）
  if (isBuilder) {
    if (wantsOwner && isScale) return 'MULTI';
    if (wantsOwner) return 'MICRO';
    if (isScale && isCrew) return 'EXEC';
    if (isScale) return 'MULTI';
    if (isCrew && isHeart) return 'MENTOR';
    if (isCrew) return 'NO2';
    if (isEdu) return 'EDU';
    return 'MENTOR';
  }

  // ===== 重要ルール =====
  // 30歳以上×サロンワーク普通以上×指名売上50万以下
  // → OWNER系・FREELANCE除外、現実的なタイプに誘導
  const isRealisticBlock = 
    (age === 'C' || age === 'D' || age === 'E') &&
    (salonWork === 'A' || salonWork === 'B' || salonWork === null) &&
    scores.S1 >= 1 && scores.S2 === 0 && scores.S3 === 0 && scores.S4 === 0;

  if (isRealisticBlock) {
    if (isHeart && isCrew) return 'MENTOR';
    if (isEdu) return 'EDU';
    if (isCrew) return 'MANAGER';
    return 'CONTRACT';
  }

  // Player系
  // 年齢高め×売上低め → CONTRACT/EDU/MENTOR寄り
  if (isOlderLowSales && !wantsOwner && !isBuilder) {
    if (isHeart) return 'MENTOR';
    if (isEdu) return 'EDU';
    return 'CONTRACT';
  }
  
  // フリーランス・業務委託志向
  if (isFree) {
    if (salesLv >= 3) return 'FREELANCE';
    return 'CONTRACT';
  }
  
  // 若い×売上高め → STAR適性
  if (isYoungHighSales && isCreate) return 'STAR';
  if (isYoungHighSales && !isCrew) return 'STAR';

  // オーナー志向あり
  if (wantsOwner) {
    if (isScale) return 'MULTI';
    return 'MICRO';
  }

  // Scale志向
  if (isScale) {
    if (isCreate) return 'STAR';
    if (!isCrew) return 'STAR';
    return 'TOP';
  }

  // Crew志向
  if (isCrew) {
    if (isHeart) return 'MANAGER';
    return 'CONTRACT';
  }

  // Solo志向
  if (isCreate) return 'CREATOR';
  if (!isHeart) return 'CRAFTER';
  return 'TOP';
}

function showResult() {

      </div>
      <div class="result-axis">

        <span class="result-axis-val">${ss} <small style="font-size:13px;color:var(--gray)">${ssPct}%</small></span>
        <div class="result-axis-bar"><div class="result-axis-bar-fill" style="width:${ssPct}%"></div></div>
      </div>
      <div class="result-axis">
        <span class="result-axis-label">Axis 04</span>
        <span class="result-axis-val">${hl} <small style="font-size:13px;color:var(--gray)">${hlPct}%</small></span>
        <div class="result-axis-bar"><div class="result-axis-bar-fill" style="width:${hlPct}%"></div></div>
      </div>
    </div>
    <div class="result-desc-wrap">
      <span class="result-desc-label">Overview</span>
      <div class="result-desc">${type.desc}</div>
    </div>
    <div class="result-cta-wrap">
      <span class="result-cta-eyebrow">Full Report — Free</span>
      <div class="result-cta-title">LINEで受け取れる<br>完全版レポート</div>
      <div class="result-cta-items">
        <div class="result-cta-item" style="color:var(--gold-light);font-weight:600;font-size:13px;letter-spacing:0.05em">あなたの本質を暴くBTI深掘り診断</div>
        <div class="result-cta-item">タイプ別 適正年収レンジ</div>
        <div class="result-cta-item">あなたの隠れた適性タイプ</div>
        <div class="result-cta-item">キャリアロードマップ</div>
        <div class="result-cta-item">あなたに合うサロン・働き方診断</div>
      </div>
      <a class="btn-line" href="https://line.me/R/ti/p/@210mmztg" target="_blank">
        <span>LINEで詳細レポートを受け取る（無料）<span class="btn-line-sub">友だち追加で完全版レポートが届きます</span></span>
        <span>→</span>
      </a>
    </div>
    <div class="result-share">
      <span class="result-share-label">Share your result</span>
      <div class="share-btns">
        <button class="share-btn" onclick="shareX('${key}','${type.name}')" title="X">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </button>
        <button class="share-btn" onclick="copyResult('${key}','${type.name}')" title="コピー">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>

      <div style="color:var(--gold);font-size:9px;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:8px">Debug</div>
      P:${scores.P} B:${scores.B} | S:${scores.S} C:${scores.C} | Sc:${scores.Sc} St:${scores.St} | H:${scores.H} L:${scores.L}<br>

function shareX(key, name) {
  const text = `BTI診断結果\n\n私は【${name}】でした！\n\n美容師のための16タイプ診断 #BTI #美容師`;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

function copyResult(key, name) {
  navigator.clipboard.writeText(`BTI診断結果: 【${name}】\n美容師のための16タイプ診断`).then(() => {
    alert('コピーしました！');
  });
}
